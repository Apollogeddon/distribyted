---
name: build

# Trigger the workflow on push or pull request
on:
  push:
    branches:
      - '*'
    tags:
      - '*'
  pull_request:

jobs:
  build:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        job_name: ['linux_amd64', 'linux_arm64', 'linux_armv7', 'mac', 'windows_amd64']

        include:
          - job_name: linux_amd64
            os: ubuntu-latest
            go_os: linux
            go_arch: amd64

          - job_name: linux_arm64
            os: ubuntu-latest
            go_os: linux
            go_arch: arm64

          - job_name: linux_armv7
            os: ubuntu-latest
            go_os: linux
            go_arch: arm
            go_arm: 7

          - job_name: mac
            os: macos-latest
            go_os: darwin
            go_arch: amd64

          - job_name: windows_amd64
            os: windows-latest
            go_os: windows
            go_arch: amd64
          
    name: ${{ matrix.job_name }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Libraries on Linux
        shell: bash
        run: |
          sudo modprobe fuse
          sudo chmod 666 /dev/fuse
          sudo chown root:$USER /etc/fuse.conf
          sudo apt-get install fuse libfuse-dev rpm pkg-config
        if: startsWith(matrix.job_name, 'linux')

      - name: Install Libraries on macOS
        shell: bash
        run: |
          brew update
          brew install --cask macfuse
        if: matrix.job_name == 'mac'

      - name: Install Libraries on Windows
        shell: powershell
        run: |
          $ProgressPreference = 'SilentlyContinue'
          choco install --allow-empty-checksums -y winfsp zip
          echo "CPATH=C:\Program Files\WinFsp\inc\fuse;C:\Program Files (x86)\WinFsp\inc\fuse" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # Copy mingw32-make.exe to make.exe so the same command line
          # can be used on Windows as on macOS and Linux
          $path = (get-command mingw32-make.exe).Path
          Copy-Item -Path $path -Destination (Join-Path (Split-Path -Path $path) 'make.exe')
        if: matrix.job_name == 'windows_amd64'

      - name: Print Go version and environment
        shell: bash
        run: |
          printf "Using go at: $(which go)\n"
          printf "Go version: $(go version)\n"
          printf "\n\nGo environment:\n\n"
          go env
          printf "\n\nSystem environment:\n\n"
          env

      - name: Go module cache
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run tests
        shell: bash
        run: |
          make test-race
        if: matrix.go_arch == 'amd64' # Only run tests on amd64 to avoid cross-compilation test issues

      - name: Convert coverage.out to coverage.lcov
        uses: jandelgado/gcov2lcov-action@v1.2.0
        if: matrix.job_name == 'linux_amd64'
      - name: Coveralls
        uses: coverallsapp/github-action@v2.3.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: coverage.lcov
        if: matrix.job_name == 'linux_amd64'

      - name: Build
        shell: bash
        run: |
          GOOS=${{ matrix.go_os }} GOARCH=${{ matrix.go_arch }} GOARM=${{ matrix.go_arm }} make build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: error
          name: build-${{ matrix.job_name }}
          path: bin/*

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: bin/*

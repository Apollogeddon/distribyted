name: CI/CD Pipeline

on:
  push:
    branches: [ '*' ]
    tags: [ '*' ]
  pull_request:
  schedule:
    - cron: '26 14 * * 1' # Weekly scan

jobs:
  gitleaks:
    name: Gitleaks
    uses: ./.github/workflows/gitleaks.yaml

  lint:
    name: Lint
    needs: gitleaks
    uses: ./.github/workflows/lint.yaml

  govulncheck:
    name: Govulncheck
    needs: lint
    uses: ./.github/workflows/govulncheck.yaml

  codeql:
    name: CodeQL
    needs: govulncheck
    uses: ./.github/workflows/codeql-analysis.yml
    permissions:
      actions: read
      contents: read
      security-events: write

  build:
    name: Build & Test
    needs: codeql
    uses: ./.github/workflows/build.yaml

  release:
    name: Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    uses: ./.github/workflows/release-please.yaml
    permissions:
      contents: write
      pull-requests: write

  docker:
    name: Docker Build & Push
    needs: [build, release]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.release.result == 'success' || needs.release.result == 'skipped') &&
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    uses: ./.github/workflows/docker.yaml
    permissions:
      contents: read
      packages: write
      security-events: write

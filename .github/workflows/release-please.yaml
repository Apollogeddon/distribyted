name: release-please

on:
  workflow_call:
    outputs:
      release_created:
        description: "True if a release was created"
        value: ${{ jobs.release-please.outputs.release_created }}
      tag_name:
        description: "The name of the tag created"
        value: ${{ jobs.release-please.outputs.tag_name }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release.json
          manifest-file: .github/.release.json

version: "2"

run:
  timeout: 5m

linters:
  enable:
    - bodyclose
    - errcheck
    - gosec
    - revive
    - forbidigo

  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (*os.File).Close

    gosec:
      excludes:
        - G304
        - G115

    forbidigo:
      forbid:
        - pattern: 'fmt\.Print(ln|f)?'
          msg: "use zerolog structured logger instead of fmt.Print*"

    revive:
      rules:
        - name: var-naming

  exclusions:
    presets:
      - std-error-handling
    rules:
      # Don't enforce errcheck/gosec in test files
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      # testenv helpers are test infrastructure only
      - path: internal/testenv
        linters:
          - errcheck
          - gosec
